<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Couple TicTacToe ❤️</title>

<style>

body{
font-family:Arial;
background:#ffe6f2;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:30px;
}

#roomBox{
margin-top:20px;
}

input{
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#ff4da6;
color:white;
cursor:pointer;
}

#game{
display:none;
}

#board{

width:300px;
margin:30px auto;

display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;

}

.cell{

width:90px;
height:90px;

background:white;
border-radius:12px;

font-size:40px;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

box-shadow:0 2px 8px rgba(0,0,0,0.1);

}

.cell:hover{

background:#ffd6eb;

}

#status{

font-size:20px;

}

#reset{

margin-top:20px;

}

</style>

</head>

<body>

<h1>❤️ Couple TicTacToe</h1>

<div id="roomBox">

<input id="roomInput" placeholder="Room Code">

<button onclick="joinRoom()">Join Room</button>

</div>

<div id="game">

<div id="status">Waiting player...</div>

<div id="board"></div>

<button id="reset" onclick="resetGame()">Reset</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "https://YOUR_PROJECT.firebaseio.com",
projectId: "YOUR_PROJECT",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let room="";
let player="";
let board=["","","","","","","","",""];

let cells=[];

const boardDiv=document.getElementById("board");

for(let i=0;i<9;i++){

let cell=document.createElement("div");

cell.className="cell";

cell.onclick=()=>makeMove(i);

boardDiv.appendChild(cell);

cells.push(cell);

}

/* JOIN ROOM */

function joinRoom(){

room=document.getElementById("roomInput").value;

if(room==="") return;

document.getElementById("roomBox").style.display="none";
document.getElementById("game").style.display="block";

player=Math.random()>0.5?"X":"O";

listenBoard();

}

/* LISTEN BOARD */

function listenBoard(){

db.ref("rooms/"+room+"/board").on("value",(snap)=>{

if(snap.exists()){

board=snap.val();

}

updateBoard();

});

}

/* UPDATE UI */

function updateBoard(){

for(let i=0;i<9;i++){

cells[i].innerText=board[i];

}

checkWinner();

}

/* MOVE */

function makeMove(i){

if(board[i]!="") return;

board[i]=player;

db.ref("rooms/"+room+"/board").set(board);

}

/* RESET */

function resetGame(){

board=["","","","","","","","",""];

db.ref("rooms/"+room+"/board").set(board);

}

/* CHECK WIN */

function checkWinner(){

const win=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

for(let c of win){

let a=c[0];
let b=c[1];
let d=c[2];

if(board[a] && board[a]==board[b] && board[a]==board[d]){

document.getElementById("status").innerText=
board[a]+" menang! ❤️";

}

}

}

</script>

</body>
</html>
